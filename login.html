<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesse sua Conta - AKINews</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #333333;
            padding: 20px;
        }

        /* Barra Superior de Atalhos */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            font-size: 1rem;
        }

        .btn-back {
            color: #d32f2f;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-subscribe-top {
            color: #d32f2f;
            text-decoration: none;
            font-weight: bold;
        }

        /* Container Principal */
        .login-container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }

        .login-title {
            font-size: 1.2rem;
            color: #666666;
            letter-spacing: 1px;
            margin-bottom: 25px;
            font-weight: normal;
        }

        /* Formulário e Inputs */
        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            position: absolute;
            top: -8px;
            left: 12px;
            background-color: #ffffff;
            padding: 0 5px;
            font-size: 0.75rem;
            color: #777777;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            border: 1px solid #999999;
            border-radius: 2px;
            font-size: 1rem;
            outline: none;
        }

        .input-group input:focus {
            border-color: #0c5e34;
        }

        /* Ícone de Olho para Senha */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #777777;
            background: none;
            border: none;
            font-size: 1.1rem;
        }

        /* Botão Entrar Principal */
        .btn-submit {
            width: 100%;
            background-color: #263238;
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
            border-radius: 2px;
        }

        .btn-submit:hover {
            background-color: #1a2327;
        }

        .forgot-password {
            display: inline-block;
            margin-top: 25px;
            color: #222222;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Divisores "OU" */
        .divider {
            margin: 30px 0;
            position: relative;
            text-align: center;
        }

        .divider::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background-color: #e0e0e0;
            z-index: 1;
        }

        .divider span {
            background-color: #ffffff;
            padding: 0 15px;
            color: #777777;
            font-size: 0.9rem;
            position: relative;
            z-index: 2;
        }

        /* Botões de Redes Sociais e Parceiros */
        .btn-social {
            width: 100%;
            display: flex;
            align-items: center;
            border: 1px solid #4285f4;
            background-color: #4285f4;
            color: #ffffff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            border-radius: 2px;
            overflow: hidden;
        }

        .btn-social .icon-bg {
            background-color: #ffffff;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-social .icon-bg svg {
            width: 20px;
            height: 20px;
        }

        .btn-social .text {
            flex: 1;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* Botão Parceiro / Vivo Fibra */
        .btn-partner {
            width: 100%;
            background-color: #6a1b9a;
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            cursor: pointer;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Seção Assinatura */
        .sub-title {
            color: #777777;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            font-weight: bold;
        }

        .btn-subscribe-main {
            width: 100%;
            background-color: #263238;
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 15px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Topo da Página -->
        <div class="top-bar">
            <a href="index.html" class="btn-back">&lt; Voltar</a>
            <a href="#" class="btn-subscribe-top">Assine já</a>
        </div>

        <!-- Título Central -->
        <h2 class="login-title">ACESSE COM SEUS DADOS</h2>

        <!-- Formulário -->
        <form action="index.html" method="GET" onsubmit="return validarLogin()">
            
            <!-- Input Email -->
            <div class="input-group">
                <label>E-MAIL</label>
                <input type="email" required autocomplete="email">
            </div>

            <!-- Input Senha -->
            <div class="input-group">
                <label>SENHA</label>
                <input type="password" id="passwordField" required>
                <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">👁️</button>
            </div>

            <!-- Botão Entrar -->
            <button type="submit" class="btn-submit">ENTRAR</button>
        </form>

        <a href="#" class="forgot-password">ESQUECEU SUA SENHA?</a>

        <!-- Primeiro Divisor -->
        <div class="divider">
            <span>OU</span>
        </div>

        <!-- Botão Google Integrado (Com Ícone Oficial em Vetor) -->
        <button class="btn-social" onclick="alert('Conectando ao Google...')">
            <div class="icon-bg">
                <svg viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
                </svg>
            </div>
            <div class="text">ACESSAR COM GOOGLE</div>
        </button>

        <!-- Botão Acesso Livre Vivo Fibra -->
        <button class="btn-partner" onclick="alert('Autenticando pelo parceiro Vivo...')">
            <span>👤</span> ACESSO LIVRE COM VIVO FIBRA
        </button>

        <!-- Segundo Divisor -->
        <div class="divider">
            <span class="sub-title">AINDA NÃO É ASSINANTE?</span>
        </div>

        <!-- Botão Assine Agora -->
        <button class="btn-subscribe-main" onclick="alert('Redirecionando para planos de assinatura...')">ASSINE AGORA</button>
    </div>

    <!-- Script para Mostrar/Ocultar Senha -->
    <script>
         <script>
    // Função para mostrar/ocultar a senha (que você já tinha)
    function togglePasswordVisibility() {
        var passwordField = document.getElementById("passwordField");
        if (passwordField.type === "password") {
            passwordField.type = "text";
        } else {
            passwordField.type = "password";
        }
    }

    // NOVA FUNÇÃO: Faz o redirecionamento para a página inicial do site
    function validarLogin() {
        // Aqui você poderia colocar regras, mas por enquanto ele vai aceitar qualquer e-mail e senha digitados
        
        // Redireciona o usuário para a página principal do seu site
        window.location.href = "index.html";
        
        // Retorna false para o formulário não recarregar a página antes de mudar de tela
        return false; 
    }
</script>
    </script>
</body>
</html>
